<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <style>
        /* Modern, clean reset */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        /* Main Chat Container */
        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Header */
        .chat-header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Chat History Area */
        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Shared Bubble Styles */
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* User Message (Right aligned, Blue) */
        .user-message {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 2px;
        }

        /* AI Message (Left aligned, Gray) */
        .ai-message {
            align-self: flex-start;
            background-color: #e9ecef;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: #fff;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
        }

        button.send-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button.send-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span>Narku AI Agent</span>
        <button class="reset-btn" onclick="resetChat()">Clear Memory</button>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message ai-message">Hello! How can I help you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask anything..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    // Allow pressing "Enter" to send
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Display User Message instantly
        appendMessage(text, 'user-message');
        userInput.value = ''; // Clear input field

        // Create a temporary "typing..." indicator
        const loadingId = appendMessage("Thinking...", 'ai-message');

        try {
            // 2. Send data to your Flask backend
            const formData = new URLSearchParams();
            formData.append('query', text);

            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            });

            const data = await response.json();

            // 3. Remove "Thinking..." and display actual AI response
            document.getElementById(loadingId).remove();
            appendMessage(data.response, 'ai-message');

        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("Error: Could not connect to server.", 'ai-message');
        }
    }

    // Helper function to create chat bubbles
    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.textContent = text;
        
        // Assign a unique ID just in case we need to remove it (like the loading state)
        const uniqueId = 'msg-' + Date.now();
        msgDiv.id = uniqueId;

        chatBox.appendChild(msgDiv);
        
        // Auto-scroll to the bottom
        chatBox.scrollTop = chatBox.scrollHeight;
        
        return uniqueId;
    }

    // Function to hook into your Flask /reset route
    async function resetChat() {
        await fetch('/reset', { method: 'POST' });
        chatBox.innerHTML = '<div class="message ai-message">Memory cleared. How can I help you?</div>';
    }
</script>

</body>
</html>
